<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银发守护 - 老年人智能健康监控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .health-card { transition: transform 0.2s; }
        .health-card:active { transform: scale(0.98); }
        .alert-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20">

    <nav class="bg-blue-600 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">银发守护中心</h1>
        <div class="flex items-center gap-4">
            <i class="fas fa-qrcode text-2xl" onclick="alert('开启扫码绑定...')"></i>
            <div class="relative">
                <i class="fas fa-bell text-xl"></i>
                <span class="absolute -top-1 -right-1 bg-red-500 text-xs rounded-full h-4 w-4 flex items-center justify-center">1</span>
            </div>
        </div>
    </nav>

    <div id="emergencyAlert" class="m-4 p-4 bg-red-100 border-l-4 border-red-500 rounded shadow-sm alert-pulse">
        <div class="flex items-center">
            <i class="fas fa-exclamation-triangle text-red-500 mr-3 text-xl"></i>
            <div>
                <p class="font-bold text-red-800">异常提醒：心率过高</p>
                <p class="text-sm text-red-700">当前心率: 115 bpm (正常范围: 60-100)</p>
            </div>
        </div>
    </div>

    <div class="px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-12 h-12 rounded-full bg-blue-100 border border-blue-200">
            <div>
                <p class="font-bold text-gray-800">张大爷 (已连接)</p>
                <p class="text-xs text-green-500"><i class="fas fa-circle text-[8px]"></i> 实时监控中</p>
            </div>
        </div>
        <button class="text-sm text-blue-600 border border-blue-600 px-3 py-1 rounded-full">查看报告</button>
    </div>

    <div class="grid grid-cols-2 gap-4 px-4">
        <div class="health-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-start mb-2">
                <i class="fas fa-heartbeat text-red-500 text-xl"></i>
                <span class="text-xs text-gray-400">实时</span>
            </div>
            <p class="text-gray-500 text-sm">心率</p>
            <p class="text-2xl font-bold">88 <span class="text-sm font-normal text-gray-400">bpm</span></p>
        </div>
        <div class="health-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-start mb-2">
                <i class="fas fa-lungs text-blue-400 text-xl"></i>
                <span class="text-xs text-gray-400">良好</span>
            </div>
            <p class="text-gray-500 text-sm">血氧</p>
            <p class="text-2xl font-bold">98 <span class="text-sm font-normal text-gray-400">%</span></p>
        </div>
        <div class="health-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-start mb-2">
                <i class="fas fa-brain text-purple-400 text-xl"></i>
                <span class="text-xs text-gray-400">平稳</span>
            </div>
            <p class="text-gray-500 text-sm">压力</p>
            <p class="text-2xl font-bold">32 <span class="text-sm font-normal text-gray-400">/100</span></p>
        </div>
        <div class="health-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-start mb-2">
                <i class="fas fa-thermometer-half text-orange-400 text-xl"></i>
                <span class="text-xs text-gray-400">正常</span>
            </div>
            <p class="text-gray-500 text-sm">体温</p>
            <p class="text-2xl font-bold">36.6 <span class="text-sm font-normal text-gray-400">℃</span></p>
        </div>
    </div>

    <div class="px-4 mt-4 space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold flex items-center gap-2"><i class="fas fa-bed text-indigo-500"></i> 昨晚睡眠</h3>
                <span class="text-sm text-gray-500">7小时30分</span>
            </div>
            <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden flex">
                <div class="bg-indigo-600 h-full" style="width: 20%"></div>
                <div class="bg-indigo-400 h-full" style="width: 50%"></div>
                <div class="bg-indigo-200 h-full" style="width: 30%"></div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="font-bold mb-3 flex items-center gap-2"><i class="fas fa-map-marker-alt text-green-500"></i> 当前位置</h3>
            <div class="bg-gray-200 w-full h-40 rounded-lg flex items-center justify-center relative overflow-hidden">
                <p class="text-gray-500 z-10 text-center text-sm p-4">地图加载中...<br>北京市朝阳区幸福路88号</p>
                <div class="absolute inset-0 opacity-40 bg-[url('https://api.placeholder.com/400x200')] bg-cover"></div>
            </div>
        </div>
    </div>

    <div class="px-4 mt-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="font-bold mb-3 flex items-center gap-2"><i class="fas fa-comment-dots text-blue-500"></i> 语音指令发送</h3>
            <div class="flex gap-2">
                <input type="text" placeholder="输入消息，手表将语音播报..." class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="alert('消息已发送，手表端正在播报：' + document.querySelector('input').value)" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">发送</button>
            </div>
            <div class="flex gap-2 mt-3 overflow-x-auto pb-2">
                <button class="whitespace-nowrap bg-gray-100 text-xs px-3 py-1.5 rounded-full" onclick="quickSend('记得喝水')">提醒喝水</button>
                <button class="whitespace-nowrap bg-gray-100 text-xs px-3 py-1.5 rounded-full" onclick="quickSend('该吃药了')">提醒吃药</button>
                <button class="whitespace-nowrap bg-gray-100 text-xs px-3 py-1.5 rounded-full" onclick="quickSend('回家吃饭')">回家吃饭</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 shadow-lg">
        <div class="flex flex-col items-center text-blue-600">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px]">监控</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fas fa-chart-line text-xl"></i>
            <span class="text-[10px]">报告</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fas fa-cog text-xl"></i>
            <span class="text-[10px]">设置</span>
        </div>
    </div>

    <script>
        function quickSend(text) {
            document.querySelector('input').value = text;
        }
    </script>
</body>
</html>
